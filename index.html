<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Radar Tecnológico - Área de Telecomunicaciones. Vigilancia tecnológica y prospectiva 2025-2035">
  <meta name="author" content="Área de Telecomunicaciones">
  
  <title>Radar Tecnológico - Área de Telecomunicaciones</title>
  
  <!-- Favicon (opcional) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%230a0e27' stroke='%2338bdf8' stroke-width='4'/><text x='50' y='60' font-size='40' text-anchor='middle' fill='%2338bdf8'>📡</text></svg>">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- ========== HEADER ========== -->
  <header class="header">
    <div class="header-content">
      <h1>Radar Tecnológico - Área de Telecomunicaciones</h1>
      <p>Vigilancia tecnológica & Prospectiva 2025 - 2035</p>
    </div>
    <div class="controls">
      <label for="jsonUpload" class="btn" title="Cargar archivo JSON">
        📂 Cargar
      </label>
      <input type="file" id="jsonUpload" accept=".json">
      <button class="btn" id="btnSave" title="Guardar datos como JSON">
        💾 Guardar
      </button>
      <button class="btn btn-secondary" id="btnExport" title="Exportar como imagen PNG">
        📸 Exportar
      </button>
    </div>
  </header>

  <!-- ========== SIDEBAR TOGGLE ========== -->
  <button class="sidebar-toggle hidden" id="sidebarToggle" title="Abrir panel lateral">
    ☰
  </button>

  <!-- ========== MAIN CONTAINER ========== -->
  <main class="main-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Direccionadores Estratégicos</h2>
        <button class="sidebar-close" id="sidebarClose" title="Cerrar panel">✕</button>
      </div>
      <div class="sidebar-content" id="sidebarContent">
        <!-- Contenido generado dinámicamente -->
      </div>
      <div class="sidebar-actions">
        <button class="btn" id="btnResetView" title="Restablecer vista y zoom">
          🎯 Restablecer
        </button>
        <button class="btn btn-secondary" id="btnShowAll" title="Mostrar todos los elementos">
          👁️ Mostrar Todo
        </button>
      </div>
    </aside>

    <!-- Radar Area -->
    <section class="radar-area">
      <div id="chart-container"></div>
      
      <!-- Zoom Controls -->
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn" title="Acercar">+</button>
        <button class="zoom-btn" id="zoomReset" title="Restablecer zoom">⊙</button>
        <button class="zoom-btn" id="zoomOut" title="Alejar">−</button>
        <div class="zoom-level" id="zoomLevel">100%</div>
      </div>
    </section>
  </main>

  <!-- ========== TOOLTIP ========== -->
  <div class="tooltip" id="tooltip" role="tooltip">
    <div class="tooltip-title"></div>
    <div class="tooltip-category"></div>
    <div class="tooltip-hint"></div>
  </div>

  <!-- ========== MODAL ========== -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-header-content">
          <nav class="modal-breadcrumb" id="modalBreadcrumb" aria-label="Navegación"></nav>
          <h3 id="modalTitle"></h3>
        </div>
        <button class="close-btn" id="modalClose" title="Cerrar" aria-label="Cerrar modal">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ========== SCRIPTS ========== -->
  <!-- Datos por defecto (evita problemas de CORS) -->
  <script src="data/default-data.js"></script>
  
  <!-- Aplicación principal -->
  <script src="js/app.js"></script>
</body>
</html>
